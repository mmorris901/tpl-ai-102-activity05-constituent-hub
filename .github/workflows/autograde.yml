name: Autograding
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AZURE_AI_LANGUAGE_ENDPOINT: ${{ secrets.AZURE_AI_LANGUAGE_ENDPOINT }}
  AZURE_AI_LANGUAGE_KEY: ${{ secrets.AZURE_AI_LANGUAGE_KEY }}
  AZURE_TRANSLATOR_KEY: ${{ secrets.AZURE_TRANSLATOR_KEY }}
  AZURE_TRANSLATOR_REGION: ${{ secrets.AZURE_TRANSLATOR_REGION }}
  CLU_PROJECT_NAME: ${{ secrets.CLU_PROJECT_NAME }}
  CLU_DEPLOYMENT_NAME: ${{ secrets.CLU_DEPLOYMENT_NAME }}
  STUDENT_CORPUS_SEED: ${{ github.actor }}

jobs:
  grade:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write .env file for autograder
        shell: bash
        run: |
          {
            echo "AZURE_AI_LANGUAGE_ENDPOINT=$AZURE_AI_LANGUAGE_ENDPOINT"
            echo "AZURE_AI_LANGUAGE_KEY=$AZURE_AI_LANGUAGE_KEY"
            echo "AZURE_TRANSLATOR_KEY=$AZURE_TRANSLATOR_KEY"
            echo "AZURE_TRANSLATOR_REGION=$AZURE_TRANSLATOR_REGION"
            echo "CLU_PROJECT_NAME=$CLU_PROJECT_NAME"
            echo "CLU_DEPLOYMENT_NAME=$CLU_DEPLOYMENT_NAME"
            echo "STUDENT_CORPUS_SEED=$STUDENT_CORPUS_SEED"
          } > .env

      - name: Run student code
        run: python app/main.py
        continue-on-error: true

      - name: Clone autograder
        uses: actions/checkout@v4
        with:
          repository: Tech901/ai102-autograder-tests
          token: ${{ secrets.AUTOGRADER_PAT }}
          path: .autograder

      # --- 56 tests, 100 points ---
      - name: "test_canary_pii_not_empty"
        id: test1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: "test_canary_pii_not_empty"
          command: "python -m pytest .autograder/activity05-constituent-hub/test_hidden.py::test_canary_pii_not_empty -v --tb=short"
          timeout: "5"
          max-score: "2"

      - name: "test_canary_sentiment_not_empty"
