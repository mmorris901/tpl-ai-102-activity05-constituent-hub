<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 435" role="img" aria-labelledby="titleFL descFL">
  <title id="titleFL">Decision Logic: Translation and Intent Fallback</title>
  <desc id="descFL">Decision-tree flow showing the conditional branching in Steps 3-4: language detection branches into pass-through (English) or Azure Translator (non-English), then CLU availability branches into ConversationAnalysisClient (configured) or keyword fallback (not configured).</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="amberBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <linearGradient id="blueBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5A94"/>
      <stop offset="100%" stop-color="#1E3F6B"/>
    </linearGradient>
    <linearGradient id="greenBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8DC63F"/>
      <stop offset="100%" stop-color="#6FA832"/>
    </linearGradient>
    <linearGradient id="purpleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
    <linearGradient id="underlineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2D5A94"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8DC63F"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#FFBF3B"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9B59B6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="435" fill="url(#bgGrad)" rx="6"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="18" font-weight="bold" fill="#FAFAFA">Decision Logic: Translation &amp; Intent Fallback</text>
  <rect x="295" y="37" width="310" height="3" rx="1.5" fill="url(#underlineGrad)"/>

  <!-- ═══ STEP 3 SECTION ═══ -->

  <!-- Step 3 label -->
  <text x="30" y="72" font-family="Syne, Calibri, sans-serif" font-size="12" font-weight="bold" fill="#555">STEP 3</text>

  <!-- Detect Language box -->
  <g filter="url(#shadow)">
    <rect x="130" y="55" width="175" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="130" y="55" width="4" height="50" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="217" y="77" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Detect Language</text>
  <text x="217" y="95" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">detect_language()</text>

  <!-- Arrow from Detect Language to Diamond -->
  <line x1="308" y1="80" x2="388" y2="80" stroke="#FFBF3B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Diamond: English? -->
  <polygon points="435,55 475,80 435,105 395,80" fill="url(#boxGrad)" stroke="#FFBF3B" stroke-width="1.5"/>
  <text x="435" y="84" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="10" font-weight="bold" fill="#FFBF3B">en?</text>

  <!-- YES branch (right): Pass through -->
  <line x1="478" y1="80" x2="568" y2="80" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="523" y="73" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F">yes</text>

  <g filter="url(#shadow)">
    <rect x="575" y="55" width="175" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="575" y="55" width="4" height="50" rx="2" fill="url(#greenBar)"/>
  </g>
  <text x="662" y="77" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">Pass Through</text>
  <text x="662" y="95" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">translated_text = original</text>

  <!-- NO branch (down): Azure Translator -->
  <line x1="435" y1="108" x2="435" y2="138" stroke="#9B59B6" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="448" y="126" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#9B59B6">no</text>

  <g filter="url(#shadow)">
    <rect x="348" y="145" width="175" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="348" y="145" width="4" height="50" rx="2" fill="url(#purpleBar)"/>
  </g>
  <text x="435" y="167" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#9B59B6">Azure Translator</text>
  <text x="435" y="185" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">translate(to_language=["en"])</text>

  <!-- Both paths merge to English Text -->
  <line x1="662" y1="108" x2="662" y2="215" stroke="#8DC63F" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="435" y1="198" x2="435" y2="215" stroke="#9B59B6" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Merge point: English Text -->
  <g filter="url(#shadow)">
    <rect x="370" y="220" width="360" height="40" rx="5" fill="url(#boxGrad)" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  </g>
  <text x="550" y="245" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="10" fill="#999">English text ready for intent classification →</text>

  <!-- ═══ STEP 4 SECTION ═══ -->

  <!-- Step 4 label -->
  <text x="30" y="290" font-family="Syne, Calibri, sans-serif" font-size="12" font-weight="bold" fill="#555">STEP 4</text>

  <!-- Recognize Intent box -->
  <g filter="url(#shadow)">
    <rect x="130" y="275" width="175" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="130" y="275" width="4" height="50" rx="2" fill="url(#blueBar)"/>
  </g>
  <text x="217" y="297" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Recognize Intent</text>
  <text x="217" y="315" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">recognize_intent()</text>

  <!-- Arrow to Diamond -->
  <line x1="308" y1="300" x2="388" y2="300" stroke="#FFBF3B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>

  <!-- Diamond: CLU configured? -->
  <polygon points="450,275 500,300 450,325 400,300" fill="url(#boxGrad)" stroke="#FFBF3B" stroke-width="1.5"/>
  <text x="450" y="297" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="9" font-weight="bold" fill="#FFBF3B">CLU</text>
  <text x="450" y="309" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="9" font-weight="bold" fill="#FFBF3B">set?</text>

  <!-- YES branch (up-right): CLU API -->
  <line x1="503" y1="300" x2="568" y2="300" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="535" y="293" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F">yes</text>

  <g filter="url(#shadow)">
    <rect x="575" y="275" width="195" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="575" y="275" width="4" height="50" rx="2" fill="url(#greenBar)"/>
  </g>
  <text x="672" y="297" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">CLU API</text>
  <text x="672" y="315" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">analyze_conversation() → intent + entities</text>

  <!-- NO branch (down): Keyword Fallback -->
  <line x1="450" y1="328" x2="450" y2="358" stroke="#FFBF3B" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <text x="463" y="346" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#FFBF3B">no</text>

  <g filter="url(#shadow)">
    <rect x="348" y="365" width="205" height="50" rx="5" fill="url(#boxGrad)" stroke="#333" stroke-width="1"/>
    <rect x="348" y="365" width="4" height="50" rx="2" fill="url(#amberBar)"/>
  </g>
  <text x="450" y="387" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#FFBF3B">Keyword Fallback</text>
  <text x="450" y="405" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">_keyword_intent_fallback() → intent only</text>

  <!-- Tech901 badge -->
  <text x="870" y="410" text-anchor="end" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#555">Tech901 AI-102</text>
</svg>