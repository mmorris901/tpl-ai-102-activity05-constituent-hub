<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 390" role="img" aria-labelledby="titleMC descMC">
  <title id="titleMC">Pretrained vs Custom Language Models</title>
  <desc id="descMC">Side-by-side comparison of pretrained Azure AI Language services (PII, Sentiment, Translation — ready immediately) versus custom CLU models (define intents, train, deploy, consume — requires labeled data). Maps to AI-102 exam domain D5.3.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E0E0E"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <linearGradient id="box" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="containerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161616"/>
      <stop offset="100%" stop-color="#101010"/>
    </linearGradient>
    <linearGradient id="blueB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2D5A94"/>
      <stop offset="100%" stop-color="#1E3F6B"/>
    </linearGradient>
    <linearGradient id="purpleB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9B59B6"/>
      <stop offset="100%" stop-color="#8E44AD"/>
    </linearGradient>
    <linearGradient id="amberB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <linearGradient id="greenB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8DC63F"/>
      <stop offset="100%" stop-color="#6FA832"/>
    </linearGradient>
    <linearGradient id="underline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFBF3B"/>
      <stop offset="100%" stop-color="#E5A530"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8DC63F"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9B59B6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="390" fill="url(#bg)" rx="6"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="18" font-weight="bold" fill="#FAFAFA">Pretrained vs Custom Language Models</text>
  <rect x="300" y="37" width="300" height="3" rx="1.5" fill="url(#underline)"/>

  <!-- ═══ VS divider ═══ -->
  <line x1="450" y1="60" x2="450" y2="90" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="450" y="108" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="14" font-weight="bold" fill="#FFBF3B">VS</text>
  <line x1="450" y1="115" x2="450" y2="340" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ═══ LEFT COLUMN: Pretrained (Steps 1-3) ═══ -->

  <!-- Header -->
  <text x="225" y="68" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="14" font-weight="bold" fill="#2D5A94">Pretrained Models</text>
  <text x="225" y="84" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="10" fill="#999">Steps 1-3 — Ready Immediately</text>

  <!-- Service 1: PII Detection -->
  <g filter="url(#sh)">
    <rect x="40" y="105" width="175" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="40" y="105" width="4" height="50" rx="2" fill="url(#blueB)"/>
  </g>
  <text x="127" y="127" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">PII Detection</text>
  <text x="127" y="145" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">recognize_pii_entities()</text>

  <!-- Service 2: Sentiment -->
  <g filter="url(#sh)">
    <rect x="235" y="105" width="175" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="235" y="105" width="4" height="50" rx="2" fill="url(#blueB)"/>
  </g>
  <text x="322" y="127" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Sentiment Analysis</text>
  <text x="322" y="145" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">analyze_sentiment()</text>

  <!-- Service 3: Translation -->
  <g filter="url(#sh)">
    <rect x="40" y="170" width="175" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="40" y="170" width="4" height="50" rx="2" fill="url(#blueB)"/>
  </g>
  <text x="127" y="192" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Language Detection</text>
  <text x="127" y="210" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">detect_language()</text>

  <!-- Service 4: Key Phrases -->
  <g filter="url(#sh)">
    <rect x="235" y="170" width="175" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="235" y="170" width="4" height="50" rx="2" fill="url(#blueB)"/>
  </g>
  <text x="322" y="192" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#2D5A94">Translation</text>
  <text x="322" y="210" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">translate()</text>

  <!-- Arrow: instant -->
  <line x1="225" y1="230" x2="225" y2="250" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Ready box -->
  <g filter="url(#sh)">
    <rect x="115" y="258" width="220" height="40" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="115" y="258" width="4" height="40" rx="2" fill="url(#greenB)"/>
  </g>
  <text x="225" y="283" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">Ready to Use</text>

  <!-- Traits -->
  <text x="40" y="318" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F">+</text>
  <text x="52" y="318" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">No training data needed</text>
  <text x="40" y="332" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F">+</text>
  <text x="52" y="332" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Works immediately after provisioning</text>
  <text x="40" y="346" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#E74C3C">-</text>
  <text x="52" y="346" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">General-purpose only, cannot customize</text>

  <!-- ═══ RIGHT COLUMN: Custom (Step 4) ═══ -->

  <!-- Header -->
  <text x="675" y="68" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="14" font-weight="bold" fill="#9B59B6">Custom Model (CLU)</text>
  <text x="675" y="84" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="10" fill="#999">Step 4 — Requires Training</text>

  <!-- Phase 1: Define -->
  <g filter="url(#sh)">
    <rect x="495" y="105" width="155" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="495" y="105" width="4" height="50" rx="2" fill="url(#purpleB)"/>
  </g>
  <text x="572" y="127" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#9B59B6">Define</text>
  <text x="572" y="145" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Intents + labeled utterances</text>

  <!-- Arrow -->
  <line x1="653" y1="130" x2="693" y2="130" stroke="#9B59B6" stroke-width="1.5" marker-end="url(#arrPurple)"/>

  <!-- Phase 2: Train -->
  <g filter="url(#sh)">
    <rect x="700" y="105" width="155" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="700" y="105" width="4" height="50" rx="2" fill="url(#purpleB)"/>
  </g>
  <text x="777" y="127" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#9B59B6">Train</text>
  <text x="777" y="145" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Build + evaluate model</text>

  <!-- Arrow down -->
  <line x1="777" y1="158" x2="777" y2="178" stroke="#9B59B6" stroke-width="1.5" marker-end="url(#arrPurple)"/>

  <!-- Phase 3: Deploy -->
  <g filter="url(#sh)">
    <rect x="700" y="185" width="155" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="700" y="185" width="4" height="50" rx="2" fill="url(#purpleB)"/>
  </g>
  <text x="777" y="207" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#9B59B6">Deploy</text>
  <text x="777" y="225" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Publish to deployment slot</text>

  <!-- Arrow left -->
  <line x1="697" y1="210" x2="657" y2="210" stroke="#9B59B6" stroke-width="1.5" marker-end="url(#arrPurple)"/>

  <!-- Phase 4: Consume -->
  <g filter="url(#sh)">
    <rect x="495" y="185" width="155" height="50" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="495" y="185" width="4" height="50" rx="2" fill="url(#purpleB)"/>
  </g>
  <text x="572" y="207" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#9B59B6">Consume</text>
  <text x="572" y="225" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">analyze_conversation()</text>

  <!-- Arrow down to result -->
  <line x1="675" y1="245" x2="675" y2="258" stroke="#8DC63F" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Result box -->
  <g filter="url(#sh)">
    <rect x="565" y="265" width="220" height="40" rx="5" fill="url(#box)" stroke="#333" stroke-width="1"/>
    <rect x="565" y="265" width="4" height="40" rx="2" fill="url(#greenB)"/>
  </g>
  <text x="675" y="290" text-anchor="middle" font-family="Syne, Calibri, sans-serif" font-size="11" font-weight="bold" fill="#8DC63F">Intent + Entities</text>

  <!-- Traits -->
  <text x="495" y="325" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F">+</text>
  <text x="507" y="325" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Domain-specific accuracy</text>
  <text x="495" y="339" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#8DC63F">+</text>
  <text x="507" y="339" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Extracts custom entities</text>
  <text x="495" y="353" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#E74C3C">-</text>
  <text x="507" y="353" font-family="Source Sans 3, Calibri, sans-serif" font-size="9" fill="#CCC">Requires labeled training data + deployment</text>

  <!-- ═══ Bottom: exam callout ═══ -->
  <g filter="url(#sh)">
    <rect x="250" y="362" width="400" height="8" rx="4" fill="url(#box)" stroke="none"/>
  </g>
  <text x="450" y="368" text-anchor="middle" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#888">AI-102 Exam Domain D5.3 — Know when to use pretrained vs custom models</text>

  <!-- Tech901 badge -->
  <text x="870" y="372" text-anchor="end" font-family="Source Sans 3, Calibri, sans-serif" font-size="8" fill="#555">Tech901 AI-102</text>
</svg>